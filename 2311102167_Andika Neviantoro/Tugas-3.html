<!DOCTYPE html>
<html>
<head>
<title>Selamat Tahun Baru Imlek</title>

<style>

body{
    margin:0;
    padding:0;
    background-color:#f2efe9;
    font-family:"Times New Roman", serif;
    text-align:center;
}

/* header dekorasi atas */
.header{
    width:420px;
    margin-top:40px;
}

/* container utama */
.container{
    margin-top:60px;
}

/* judul utama */
h1{
    color:#9b0000;
    font-size:58px;
    line-height:1.25;
    letter-spacing:4px;
    margin-bottom:20px;
}

/* paragraf ucapan */
p{
    color:#9b0000;
    font-size:19px;
    max-width:620px;
    margin:0 auto;
    line-height:1.6;
}

/* lampion kiri */
.lampion-kiri{
    position:absolute;
    left:140px;
    top:70px;
    width:90px;
}

/* lampion kanan */
.lampion-kanan{
    position:absolute;
    right:140px;
    top:70px;
    width:90px;
}

</style>
</head>

<body>

<img src="header.png" class="header">

<img src="lampion.png" class="lampion-kiri">
<img src="lampion.png" class="lampion-kanan">

<div class="container">

<h1>
SELAMAT<br>
TAHUN BARU<br>
IMLEK
</h1>

<p>
Semoga Tahun Baru Imlek ini membawa kebahagiaan,
kesehatan, dan kemakmuran bagi Anda dan keluarga.
</p>

</div>

</body>
</html>
