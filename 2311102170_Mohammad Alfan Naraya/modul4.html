<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ucapan Ramadan 1447H</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cinzel:wght@600;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    
    <style>
        :root {
            --emerald-deep: #052419;
            --emerald-mid: #0a3d2a;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at center, var(--emerald-mid) 0%, var(--emerald-deep) 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Bingkai Ornamen Layar */
        body::before {
            content: "";
            position: fixed;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(191, 149, 63, 0.2);
            pointer-events: none;
            z-index: 10;
        }

        .text-gold {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Cinzel', serif;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            padding: 4rem 2rem;
        }

        .arabic-glow {
            font-family: 'Amiri', serif;
            font-size: 4.5rem;
            text-shadow: 0 0 30px rgba(191, 149, 63, 0.3);
            margin-bottom: 0.5rem;
        }

        .divider-gold {
            height: 1px;
            width: 120px;
            background: var(--gold-gradient);
            margin: 25px auto;
            opacity: 0.6;
        }

        .floating-icon {
            position: absolute;
            color: rgba(191, 149, 63, 0.2);
            animation: float 6s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .message-text {
            font-size: 1.15rem;
            line-height: 2;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>

    <i class="bi bi-moon-stars-fill floating-icon" style="top: 10%; left: 10%; font-size: 6rem; animation-delay: 0s;"></i>
    <i class="bi bi-lamp-fill floating-icon" style="bottom: 10%; right: 10%; font-size: 8rem; animation-delay: 2s;"></i>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-6 text-center">
                
                <div class="main-card px-4">
                    <div class="arabic-glow text-gold">رمضان مبارك</div>
                    
                    <h5 class="text-white fw-light mb-0" style="letter-spacing: 8px; font-size: 0.8rem; opacity: 0.7;">
                        RAMADAN KAREEM 1447H
                    </h5>
                    
                    <div class="divider-gold"></div>

                    <div class="my-5">
                        <h1 class="display-5 fw-bold mb-4" style="font-family: 'Cinzel', serif;">Selamat Menunaikan Ibadah Puasa</h1>
                        <p class="message-text">
                            Semoga di bulan yang penuh cahaya ini, setiap langkah kita diberkahi, 
                            setiap doa didengarkan, dan hati kita dipenuhi dengan kedamaian 
                            serta rasa syukur yang mendalam.
                        </p>
                    </div>

                    <div class="mt-5">
                        <p class="small text-gold mb-1" style="letter-spacing: 2px;">SALAM HANGAT</p>
                        <h4 class="fw-bold fw-italic">[Mohammad Alfan Naraya]</h4>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
