<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Kartu Ucapan Ramadhan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 182, 193, .3), transparent 40%),
                radial-gradient(circle at bottom right, rgba(173, 216, 230, .3), transparent 40%),
                linear-gradient(135deg, #fdeff4, #e3f6f5, #fef6e4);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 15px;
            color: #5a5a5a;
        }

        .card-wrapper {
            width: 100%;
            max-width: 520px;
        }

        .ramadhan-card {
            background: rgba(255, 255, 255, .7);
            border-radius: 28px;
            padding: 40px 32px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 35px rgba(0, 0, 0, .08);
            border: 1px solid rgba(255, 255, 255, .6);
        }

        .moon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff7c2, #ffe5b4);
            position: relative;
            box-shadow: 0 0 20px rgba(255, 210, 150, .4);
        }

        .moon:after {
            content: "";
            position: absolute;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #fdeff4;
            top: 8px;
            left: 18px;
        }

        .tag {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 999px;
            background: #ffe6eb;
            color: #d36b8c;
            font-weight: 700;
            font-size: .85rem;
            letter-spacing: 2px;
            margin-bottom: 18px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #6a6a6a;
        }

        .subtitle {
            font-size: 1rem;
            margin-bottom: 22px;
            color: #777;
        }

        .divider {
            width: 70px;
            height: 3px;
            margin: 0 auto 22px;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, #ffb6c1, transparent);
        }

        .message {
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 26px;
            color: #666;
        }

        .signature-box {
            background: #fff;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid #f0f0f0;
        }

        .signature-title {
            font-size: .9rem;
            color: #999;
            margin-bottom: 6px;
        }

        .signature-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #444;
        }

        .signature-sub {
            font-size: .9rem;
            color: #888;
        }

        .btn-card {
            display: inline-block;
            padding: 12px 26px;
            border-radius: 999px;
            background: linear-gradient(135deg, #ffcad4, #cde7ff);
            color: #444;
            text-decoration: none;
            font-weight: bold;
            transition: .25s;
        }

        .btn-card:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #ffd6e0, #d8ecff);
        }
    </style>
</head>

<body>

    <div class="card-wrapper">

        <div class="ramadhan-card">

            <div class="moon"></div>

            <div class="tag">Marhaban Ya Ramadhan</div>

            <h1>Ramadhan Kareem</h1>

            <p class="subtitle">
                Selamat menjalankan ibadah puasa di bulan yang penuh berkah.
            </p>

            <div class="divider"></div>

            <p class="message">
                Semoga bulan Ramadhan membawa kedamaian,
                kebahagiaan, dan keberkahan untuk setiap
                langkah yang kita jalani.
            </p>

            <div class="signature-box">

                <div class="signature-title">Ucapan dari</div>

                <div class="signature-name">
                    Nia Novela Ariandini
                </div>

                <div class="signature-sub">
                    2311102057
                </div>

            </div>

            <a href="#" class="btn-card">
                Selamat Menjalankan Ibadah Puasa
            </a>

        </div>

    </div>

</body>

</html>
